<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AURA — Inscription</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-grid"></div>
  </div>

  <div class="auth-container">

    <!-- Left (desktop) -->
    <div class="auth-panel auth-left">
      <div>
        <div class="auth-logo">AURA</div>
        <div class="auth-slogan">Your Musical Identity</div>
      </div>
      <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center;">
          <div style="font-size:72px; margin-bottom:20px; animation:authFloat 4s ease-in-out infinite;">🎵</div>
          <div style="font-family:'Syne',sans-serif; font-size:20px; font-weight:700; margin-bottom:8px; color:#f0f0ff;">
            Rejoins la communauté
          </div>
          <div style="color:#505070; font-size:14px; max-width:260px; margin:0 auto; line-height:1.7;">
            Des milliers de music lovers partagent leur univers chaque jour.
          </div>
        </div>
      </div>
      <div class="auth-testimonial">
        <div class="auth-testimonial-quote">"Mon aura musicale me définit mieux que n'importe quelle bio."</div>
        <div class="auth-testimonial-author">— Marcus D., producteur</div>
      </div>
    </div>

    <!-- Right — Form -->
    <div class="auth-panel auth-right">
      <div class="auth-form-wrap">

        <div class="auth-form-logo">AURA</div>

        <h1 class="auth-title">Crée ton compte 🚀</h1>
        <p class="auth-subtitle">Rejoins la communauté musicale</p>

        <form class="auth-form" id="register-form" novalidate>

          <!-- Prénom + Username — two columns -->
          <div class="auth-two-col">
            <div class="form-group">
              <label class="form-label" for="display-name">Prénom</label>
              <div class="input-wrap">
                <i class="fa-solid fa-user input-icon"></i>
                <input
                  type="text"
                  id="display-name"
                  class="input-with-icon"
                  placeholder="Yasmine"
                  autocomplete="given-name"
                >
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="username">Username</label>
              <div class="input-wrap">
                <!-- @ as left icon -->
                <span class="input-icon" style="font-size:15px; font-weight:600; color:#505070;">@</span>
                <input
                  type="text"
                  id="username"
                  class="input-with-icon"
                  placeholder="yasmine.k"
                  autocomplete="username"
                  autocorrect="off"
                  autocapitalize="none"
                  spellcheck="false"
                  required
                >
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <div class="input-wrap">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input
                type="email"
                id="email"
                class="input-with-icon"
                placeholder="ton@email.com"
                autocomplete="email"
                inputmode="email"
                required
              >
            </div>
          </div>

          <!-- Mot de passe -->
          <div class="form-group">
            <label class="form-label" for="password">Mot de passe</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                class="input-with-icon"
                placeholder="Min. 8 caractères"
                autocomplete="new-password"
                required
              >
              <!-- Eye button inside input -->
              <button type="button" class="input-toggle" id="toggle-pw" aria-label="Afficher le mot de passe">
                <i class="fa-solid fa-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <!-- Mood -->
          <div class="form-group">
            <label class="form-label" for="mood">Ton mood musical</label>
            <select id="mood">
              <option value="dark">🌑 Dark</option>
              <option value="chill">❄️ Chill</option>
              <option value="rage">🔥 Rage</option>
              <option value="focus" selected>🎯 Focus</option>
              <option value="love">💜 Love</option>
              <option value="gym">💪 Gym</option>
              <option value="night">⭐ Night</option>
            </select>
          </div>

          <!-- CGU -->
          <label class="auth-check-group">
            <input type="checkbox" id="terms">
            <span class="auth-check-label">
              J'accepte les <a href="#" class="auth-link">conditions d'utilisation</a>
              et la <a href="#" class="auth-link">politique de confidentialité</a>
            </span>
          </label>

          <!-- Messages -->
          <div id="register-error"   class="auth-error" style="display:none;"></div>
          <div id="register-success" style="display:none; background:rgba(16,185,129,0.1);
               border:1px solid rgba(16,185,129,0.3); border-radius:10px;
               padding:12px 16px; font-size:13px; color:#10b981; line-height:1.5;">
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-full" id="register-btn">
            <span>Créer mon compte</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>

          <div class="auth-divider"><span>déjà membre ?</span></div>

          <div class="auth-switch">
            <a href="login.html" class="auth-link">Se connecter →</a>
          </div>

        </form>
      </div>
    </div>

  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    Auth.redirectIfLoggedIn();

    /* ---- Eye toggle ---- */
    const toggleBtn = document.getElementById('toggle-pw');
    const pwInput   = document.getElementById('password');
    const eyeIcon   = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', function () {
      const isHidden = pwInput.type === 'password';
      pwInput.type   = isHidden ? 'text' : 'password';
      eyeIcon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    /* ---- Username sanitize ---- */
    document.getElementById('username').addEventListener('input', function () {
      this.value = this.value.toLowerCase().replace(/[^a-z0-9._]/g, '');
    });

    /* ---- Form submit ---- */
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn     = document.getElementById('register-btn');
      const errEl   = document.getElementById('register-error');
      const sucEl   = document.getElementById('register-success');

      const displayName = document.getElementById('display-name').value.trim();
      const username    = document.getElementById('username').value.trim();
      const email       = document.getElementById('email').value.trim();
      const password    = document.getElementById('password').value;
      const mood        = document.getElementById('mood').value;
      const terms       = document.getElementById('terms').checked;

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      // Validation
      if (!username || !email || !password) {
        errEl.textContent   = 'Remplis tous les champs obligatoires.';
        errEl.style.display = 'block';
        return;
      }
      if (username.length < 3) {
        errEl.textContent   = 'Le username doit faire au moins 3 caractères.';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        errEl.textContent   = 'Le mot de passe doit faire au moins 8 caractères.';
        errEl.style.display = 'block';
        return;
      }
      if (!terms) {
        errEl.textContent   = 'Accepte les conditions d\'utilisation.';
        errEl.style.display = 'block';
        return;
      }

      // Loading
      btn.disabled  = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Création...</span>';

      try {
        await Auth.register({ email, password, username, displayName: displayName || username });

        // Set mood after registration
        const sb = getSupabase();
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
          await sb.from('profiles').update({ current_mood: mood }).eq('id', user.id);
        }

        btn.innerHTML       = '<i class="fa-solid fa-check"></i><span>Compte créé !</span>';
        sucEl.innerHTML     = '✅ Compte créé ! Vérifie ton email puis connecte-toi.';
        sucEl.style.display = 'block';

        setTimeout(() => { window.location.href = 'login.html'; }, 2500);

      } catch (err) {
        errEl.textContent   = err.message || 'Erreur lors de l\'inscription.';
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.innerHTML       = '<span>Créer mon compte</span><i class="fa-solid fa-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
