<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=pages/login.html">
  <title>AURA</title>
  <link rel="stylesheet" href="css/variables.css">
  <style>
    body {
      background: #050508;
      color: #f0f0ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Syne', sans-serif;
      margin: 0;
    }
    .logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #9d5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo">AURA</div>
  <script>
    // Redirect to home if already logged in, else login
    // Using localStorage as quick check before Supabase loads
    const hasSession = localStorage.getItem('aura-auth');
    if (hasSession) {
      window.location.href = 'pages/home.html';
    } else {
      window.location.href = 'pages/login.html';
    }
  </script>
</body>
</html>
